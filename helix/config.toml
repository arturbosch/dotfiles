theme = "fleet_dark"

[editor]
true-color = true
line-number = "relative"
idle-timeout = 100
shell = ["fish", "-c"]

[editor.cursor-shape]
insert = "bar"

[editor.lsp]
display-messages = true

[keys.normal]
C-s = ":w"
A-s = [":format", ":w"]
C-q = ":q"

A-n = "search_next"
A-N = "search_prev"

C-K    = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
"C-S-up"   = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
C-J    = ["extend_to_line_bounds", "delete_selection", "paste_after"]   
"C-S-down" = ["extend_to_line_bounds", "delete_selection", "paste_after"]   

esc = ["collapse_selection", "keep_primary_selection"]

space.B = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"
C-B = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name} | string split ' ' -f 1 | xargs git show"
